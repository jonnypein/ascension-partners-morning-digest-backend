name: Yearly Company Profiles

# 06:00 UTC on April 1st each year. By then, all calendar-year filers
# (the bulk of the watchlist) have submitted their annual 10-Ks for the
# prior fiscal year. Off-calendar filers (AAPL Sep, MSFT Jun) get picked
# up the following year — close enough for a once-a-year refresh.
#
# Runs both 10-K-derived builders together: company profiles (Item 1
# Business) and risk profiles (Item 1A Risk Factors). Same source filing,
# same cadence, ~$5-7 combined Anthropic spend per run.
#
# To refresh on demand, hit "Run workflow" on the Actions tab.
on:
  schedule:
    - cron: "0 6 1 4 *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: yearly-profiles
  cancel-in-progress: false

jobs:
  build-profiles:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build company profiles (Item 1 Business)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python company_profile_builder.py

      - name: Build risk profiles (Item 1A Risk Factors)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python risk_profile_builder.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profiles-${{ github.run_id }}
          path: logs/
          if-no-files-found: ignore
          retention-days: 30
